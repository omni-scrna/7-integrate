[workspace]
channels = ["conda-forge", "bioconda"]
name = "7-integrate"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
check = "Rscript check.R"
export-env = "pixi workspace export conda-environment --name $(basename $(git rev-parse --show-toplevel)) envs/integrate.yml && sed -i '1s/^/# this file was auto-generated by pixi - do not edit by hand\\n/' envs/integrate.yml"

[dependencies]
r-base = ">=4.5"
r-harmony = "*"
bioconductor-rhdf5 = "*"
"r-data.table" = "*"
r-optparse = "*"
r-magrittr = "*"
